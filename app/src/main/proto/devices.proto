syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "io.aether.android";
option java_multiple_files = true;

// Info about a Matter device that is persisted in a Proto DataStore.
message Device {
    // Timestamp when the device was commissioned.
    google.protobuf.Timestamp date_commissioned = 1;

    // VID
    string vendorId = 2;

    // PID
    string productId = 3;

    // Device type.
    enum DeviceType {
        TYPE_UNSPECIFIED = 0;
        TYPE_UNKNOWN = 1;
        TYPE_LIGHT = 2;
        TYPE_OUTLET = 3;
        TYPE_DIMMABLE_LIGHT = 4;
        TYPE_COLOR_TEMPERATURE_LIGHT = 5;
        TYPE_EXTENDED_COLOR_LIGHT = 6;
        TYPE_LIGHT_SWITCH = 7;
    }
    DeviceType deviceType = 4;

    // Device ID within the app's fabric.
    int64 device_id = 5;

    // Device name.
    string name = 6;

    // Room where device is located.
    string room = 7;

    // The name of the model for the device.
    string productName = 8;

    // The name of the vendor for the device.
    string vendorName = 9;

    // Matter node id for this commissioned device.
    int64 node_id = 10;

    // Matter endpoint controlled by this logical device entry.
    int32 endpoint = 11;

    // Whether this endpoint exposes Level Control.
    bool supports_level_control = 12;

    // Whether this endpoint exposes Color Control color temperature attribute.
    bool supports_color_temperature = 13;
}

message Devices {
    int64 last_device_id = 1;
    repeated Device devices = 2;
}
