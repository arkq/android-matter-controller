name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      gradle_task:
        description: "Gradle task to run for manual builds"
        required: true
        default: assembleRelease
        type: choice
        options:
          - assembleRelease
          - installDebug

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (release tags)
        if: github.event_name == 'push'
        run: ./gradlew --no-daemon assembleRelease

      - name: Build APK (manual)
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew --no-daemon ${{ github.event.inputs.gradle_task }}

      - name: Collect APK files
        if: github.event_name == 'push' || github.event.inputs.gradle_task == 'assembleRelease'
        run: |
          mkdir -p release-apks
          find . -type f -name "*.apk" -exec cp {} release-apks/ \;

      - name: Upload APK artifacts
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.gradle_task == 'assembleRelease'
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apks/*.apk

      - name: Create new release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-apks/*.apk
